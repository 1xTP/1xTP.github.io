name: Deploy Jekyll to GitHub Pages

on:
  # 1. Triggers a build whenever you push new Markdown files
  push:
    branches: ["main"]
  # 2. Triggers a build automatically at Midnight UTC every single day
  schedule:
    - cron: '0 0 * * *'
  # 3. Allows you to run this workflow manually from the GitHub Actions tab if needed
  workflow_dispatch:

# Grants GitHub the permissions needed to push the compiled HTML to your live site
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Setup Ruby and Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true # This automatically reads your Gemfile and runs 'bundle install'
          
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Build with Jekyll
        # This is the exact command you ran locally, but we let GitHub do it!
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          
      - name: Upload compiled HTML artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
